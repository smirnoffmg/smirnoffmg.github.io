sections:
  - title: Summary
    entries:
      - bullets:
          - "Engineer with 15+ years designing event-driven distributed systems at scale. Own the architecture of a credit automation platform spanning six teams at Raiffeisenbank; the event-driven redesign cut credit approval from 3 days to under 24 hours and reduced Kubernetes infrastructure costs by 30%. Set platform-wide technical standards, drive cross-team architectural decisions, and ship open-source infrastructure tooling."

  - title: Experience
    entries:
      - title: "Principal Technical Lead, Raiffeisenbank"
        dates: "2024 – Present"
        bullets:
          - "Own the architecture of an enterprise credit automation platform on event-driven microservices (Kafka, gRPC, REST), with technical decisions spanning six engineering teams in the risk and compliance domain."
          - "Architected the migration to an event-driven system that reduced Kubernetes infrastructure costs by 30% and improved observability via Prometheus and Grafana."
          - "Redesigned the approval pipeline and CI/CD to bring credit approval from 3 days to under 24 hours."
          - "Established platform-wide engineering standards — service boundaries, event contracts, interview rubric — adopted across teams; mentored senior engineers toward technical ownership."

      - title: "Senior Software Engineer, Yandex"
        dates: "2022 – 2023"
        bullets:
          - "Owned the Python library porting pipeline for Yandex's air-gapped internal package ecosystem: evaluated upstream OSS, authored compatibility patches, and integrated them into Yandex's proprietary VCS and package registry."
          - "Engineered automation that reduced manual overhead in the import and patching workflow, enabling internal teams to track and adopt new upstream releases reliably."

      - title: "Lead Software Developer, EPAM Systems"
        dates: "2018 – 2021"
        bullets:
          - "Technical lead for agile teams of 8–9 engineers on pharmaceutical software, owning architecture, code quality, and delivery."
          - "Founded a Python Competence Center, raising engineering standards across 100+ engineers through lectures, workshops, and assessment frameworks."

      - title: "Co-Founder and Lead Python Developer, Aglaya"
        dates: "2014 – 2018"
        bullets:
          - "Co-founded the company and led the technical delivery of custom information systems for enterprise clients with a team of 10."

  - title: Selected Contract Engagements
    entries:
      - title: "Engineering Lead, Metamap"
        dates: "2022"
        sub: "contract"
        bullets:
          - "Led the architectural migration from monolith to microservices (Python, REST, Docker/Kubernetes), enabling product expansion into Latin America and Singapore."
          - "Reduced the codebase by 50%, cutting release cycles from days to hours through a CI/CD pipeline overhaul."

      - title: "Engineering Lead, Runity"
        dates: "2022 – 2023"
        sub: "contract"
        bullets:
          - "Delivered six previously stalled projects by establishing clear technical ownership."
          - "Improved estimation accuracy, reducing variance by 10–15% through structured planning and delivery observability."

  - title: Open Source & Projects
    entries:
      - title: "Metrics: Jira Engineering Analytics Toolkit"
        sub: "Author and Maintainer"
        location: "Open Source"
        dates: "2023 – Present"
        bullets:
          - "Open-source toolkit computing cycle time, lead time, queue time, throughput, and other delivery metrics from Jira data."
          - "Designed to be modular, extensible, and fully tested."
          - "[Source on GitHub](https://github.com/smirnoffmg/metrics)"
      - title: "Product Engineering Toolkit (PET)"
        sub: "Author and Maintainer"
        location: "Open Source"
        dates: "2025 – Present"
        bullets:
          - "Multi-agent AI assistant for PDLC and discovery processes"
          - "[Source on GitHub](https://github.com/smirnoffmg/pet)"

  - title: Publications
    entries:
      - title: "Software Engineering Metrics"
        sub: "Medium, 2024"
        bullets:
          - "Practical delivery metrics for software teams using Jira data: identifying bottlenecks, visualising trends, and forecasting."
          - "[Read on Medium](https://medium.com/@smirnoffmg/software-engineering-metrics-b6c4b37b5fd2)"
      - title: "Profiling Asynchronous Python"
        sub: "Medium, 2023"
        bullets:
          - "Performance bottlenecks in async Python, deterministic vs. statistical profilers, and interpreting profiler results for optimisation."
          - "[Read on Medium](https://medium.com/@smirnoffmg/profiling-asynchronous-python-b73cde75aa2d)"

  - title: Education
    entries:
      - title: "MIPT University"
        sub: "M.Sc. in Data Science"
        location: "Moscow, Russia"
        dates: "2023 – 2025"
        bullets:
          - "Focus: machine learning systems and MLOps."

      - title: "ITMO University"
        sub: "B.Sc. in Information Security"
        location: "Saint Petersburg, Russia"
        bullets:
          - "Thesis: a neural network for detecting steganographic content in digital images."

  - title: Certifications
