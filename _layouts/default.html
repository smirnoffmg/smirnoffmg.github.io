<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png">
    <link rel="manifest" href="/img/site.webmanifest">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Person",
          "@id": "https://smirnoffmg.dev/#person",
          "name": "Maksim Smirnov",
          "jobTitle": "Principal Technical Lead & Software Engineer",
          "email": "smirnoffmg@gmail.com",
          "url": "https://smirnoffmg.dev",
          "address": {
            "@type": "PostalAddress",
            "addressCountry": "RS",
            "addressLocality": "Serbia"
          },
          "sameAs": [
            "https://www.linkedin.com/in/hello-maksim-smirnov",
            "https://github.com/smirnoffmg",
            "https://t.me/smirnov_maksim_grigorevich"
          ],
          "knowsAbout": [
            "Python", "Go", "AWS", "Kubernetes", "Kafka", "gRPC", "REST",
            "Microservices", "Event-Driven Architecture", "Distributed Systems",
            "Software Architecture", "Engineering Leadership", "Mentoring",
            "CI/CD", "Prometheus", "Grafana", "Terraform", "System Design"
          ]
        },
        {
          "@type": "ProfilePage",
          "@id": "https://smirnoffmg.dev/#profilepage",
          "name": "Maksim Smirnov — CV",
          "url": "https://smirnoffmg.dev",
          "description": "CV and professional profile of Maksim Smirnov, Principal Technical Lead and Software Engineer specialising in Python, Go, event-driven architecture, and engineering leadership.",
          "mainEntity": { "@id": "https://smirnoffmg.dev/#person" }
        }
      ]
    }
    </script>
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <style>
      .cv-print-btn {
        position: fixed;
        top: 1.2rem;
        right: 1.2rem;
        padding: 0.45rem 1rem;
        font-size: 0.8rem;
        font-family: inherit;
        background: #222;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        z-index: 100;
        opacity: 0.75;
        transition: opacity 0.15s;
      }
      .cv-print-btn:hover { opacity: 1; }
      @media print { .cv-print-btn { display: none; } }
    </style>

    {% if site.google_analytics %}
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', '{{ site.google_analytics }}');
    </script>
    {% endif %}

    {% if site.yandex_metrika %}
    <!-- Yandex.Metrika counter -->
    <script type="text/javascript">
        (function (m, e, t, r, i, k, a) {
            m[i] = m[i] || function () { (m[i].a = m[i].a || []).push(arguments) };
            m[i].l = 1 * new Date();
            for (var j = 0; j < document.scripts.length; j++) { if (document.scripts[j].src === r) { return; } }
            k = e.createElement(t), a = e.getElementsByTagName(t)[0], k.async = 1, k.src = r, a.parentNode.insertBefore(k, a)
        })(window, document, 'script', 'https://mc.yandex.ru/metrika/tag.js?id={{ site.yandex_metrika }}', 'ym');

        ym({{ site.yandex_metrika }}, 'init', {
            ssr: true,
            webvisor: true,
            clickmap: true,
            ecommerce: "dataLayer",
            accurateTrackBounce: true,
            trackLinks: true
        });
    </script>
    <noscript>
        <div><img src="https://mc.yandex.ru/watch/{{ site.yandex_metrika }}" style="position:absolute; left:-9999px;"
                alt="" /></div>
    </noscript>
    {% endif %}
</head>

<body>
    <button class="cv-print-btn" onclick="window.print()">Save as PDF</button>
    <main>
        {{ content }}
    </main>

    {% if site.yandex_metrika %}
    <!-- Yandex.Metrika goal tracking -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('[data-ym-goal]').forEach(function (el) {
                el.addEventListener('click', function () {
                    var goal = this.getAttribute('data-ym-goal');
                    if (typeof ym !== 'undefined') {
                        ym({{ site.yandex_metrika }}, 'reachGoal', goal);
                    }
                });
            });
        });
    </script>
    {% endif %}
</body>

</html>
